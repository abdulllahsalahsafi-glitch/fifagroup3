<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />

    <title>FIFA GROUP</title>

    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="theme-color" content="#02030A" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Tajawal:wght@700;800;900&display=block');

      html,
      body,
      #root {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: #02030A;
      }

      #fifa-splash {
        --fifa-splash-progress: 0%;
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #02030A;
        transition: opacity 420ms ease, visibility 420ms ease;
      }

      #fifa-splash.fifa-splash-hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .fifa-splash-card {
        width: min(100%, 320px);
        min-height: 250px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        transform: translateY(-18px);
      }

      .fifa-splash-logo-shell {
        width: 80px;
        height: 80px;
        display: grid;
        place-items: center;
        border-radius: 21px;
        background: linear-gradient(135deg, #00E676 0%, #00D4B8 100%);
        box-shadow:
          0 0 72px rgba(0, 230, 118, 0.26),
          0 18px 44px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.18);
        animation: fifaSplashLogo 1050ms cubic-bezier(0.2, 0.9, 0.2, 1) both;
      }

      .fifa-splash-logo {
        width: 43px;
        height: 43px;
        border-radius: 50%;
        object-fit: contain;
        filter:
          drop-shadow(0 12px 20px rgba(0, 0, 0, 0.34))
          drop-shadow(0 0 12px rgba(0, 212, 255, 0.20));
      }

      .fifa-splash-title {
        margin: 28px 0 0;
        min-height: 31px;
        font-family: 'Orbitron', 'Tajawal', system-ui, sans-serif;
        font-size: 30px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.5px;
        color: #F4F8FF;
        font-variant-ligatures: none;
        text-rendering: geometricPrecision;
        -webkit-font-smoothing: antialiased;
      }

      .fifa-splash-title span {
        color: #67F5C0;
      }

      .fifa-splash-season {
        margin: 36px 0 0;
        min-height: 13px;
        font-family: 'Orbitron', 'Tajawal', system-ui, sans-serif;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 4px;
        color: #9AA0BF;
        font-variant-ligatures: none;
        text-rendering: geometricPrecision;
        -webkit-font-smoothing: antialiased;
      }

      .fifa-splash-progress {
        position: relative;
        width: 180px;
        height: 3px;
        margin-top: 27px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .fifa-splash-progress::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,.16), transparent);
        opacity: .35;
      }

      .fifa-splash-progress::after {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        right: 0;
        width: var(--fifa-splash-progress);
        border-radius: inherit;
        background: linear-gradient(90deg, #00D4FF 0%, #00E676 100%);
        box-shadow: 0 0 18px rgba(0, 230, 118, 0.35);
        transition: width 620ms cubic-bezier(0.22, 0.8, 0.22, 1);
      }

      @keyframes fifaSplashLogo {
        0% {
          opacity: 0;
          transform: scale(0.74) translateY(10px);
        }
        58% {
          opacity: 1;
          transform: scale(1.045) translateY(0);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div id="fifa-splash" aria-hidden="true">
      <div class="fifa-splash-card">
        <div class="fifa-splash-logo-shell">
          <img class="fifa-splash-logo" src="/splash-logo.png" alt="" />
        </div>
        <div class="fifa-splash-title">FIFA <span>GROUP</span></div>
        <div class="fifa-splash-season">SEASON 6 · 2025</div>
        <div class="fifa-splash-progress"></div>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
